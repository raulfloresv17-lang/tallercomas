<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar Productos</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#eef3fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:420px;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:180px;
margin-bottom:10px;
}

h2{
margin-bottom:15px;
color:#0f172a;
}

input{
width:100%;
padding:14px;
border:1px solid #cbd5e1;
border-radius:10px;
margin-bottom:12px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

.btn-buscar{
background:#2563eb;
color:white;
}

.btn-sumar{
background:#16a34a;
color:white;
display:none;
}

.producto-box{
text-align:left;
margin-top:10px;
display:none;
}

label{
font-weight:bold;
font-size:14px;
}

.stock-input{
background:#f8fafc;
}

.mensaje{
margin-top:10px;
color:green;
font-weight:bold;
}

.producto-img{
width:100%;
max-height:180px;
object-fit:contain;
border-radius:12px;
margin:10px 0;
border:1px solid #e2e8f0;
}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>🔍 Buscar Producto</h2>

    <style>
.menu-inventario{
  display:flex;
  width:100%;
  gap:8px;
  margin-top:10px;
}

.menu-inventario button{
  flex:1;
  padding:14px 5px;
  border:none;
  border-radius:12px;
  font-size:14px;
  font-weight:bold;
  color:white;
  background:#2563eb;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.menu-inventario button:active{
  transform:scale(0.97);
}

/* Colores diferentes opcionales */
.menu-inventario button:nth-child(1){
  background:#2563eb; /* buscar */
}

.menu-inventario button:nth-child(2){
  background:#16a34a; /* ingresar */
}

.menu-inventario button:nth-child(3){
  background:#f59e0b; /* trasladar */
}
</style>

<div class="menu-inventario">

  <button onclick="irBuscar()">BUSCAR</button>
  <button onclick="irIngresar()">INGRESAR</button>
  <button onclick="irTrasladar()">TRASLADAR</button>

</div>

<script>
function irBuscar(){
  window.location.href = "index.html"; // cambia si tu archivo tiene otro nombre
}

function irIngresar(){
  window.location.href = "ingreso.html";
}

function irTrasladar(){
  window.location.href = "traslados.html";
}
</script>
    
    <br>
    
<input type="text" id="codigo" placeholder="Ingresa código del producto">

<button class="btn-buscar" onclick="buscarProducto()">Buscar</button>

<div class="producto-box" id="productoBox">

<p><b>Producto encontrado:</b></p>

<img id="imgProducto" class="producto-img">

<p id="infoProducto"></p>

<label>Stock a agregar:</label>
<input type="number" id="stockAdd">

<button class="btn-sumar" id="btnSumar" onclick="sumarStock()">
➕ Sumar Stock
</button>

</div>

<div class="mensaje" id="mensaje"></div>

</div>

<script>

let productos = [];
let productoIndex = -1;

/* CARGAR BD */
async function cargar(){
let res = await fetch("productos.json");
productos = await res.json();
}
cargar();

/* BUSCAR */
function buscarProducto(){

let codigo = document.getElementById("codigo").value.trim();

productoIndex = productos.findIndex(p => p.codigo === codigo);

if(productoIndex === -1){
mostrar("❌ Producto no encontrado");
document.getElementById("productoBox").style.display = "none";
return;
}

let p = productos[productoIndex];

document.getElementById("productoBox").style.display = "block";
document.getElementById("btnSumar").style.display = "block";

/* 🔥 IMAGEN */
document.getElementById("imgProducto").src = p.imagen || "";

document.getElementById("infoProducto").innerHTML =
`
<b>Código:</b> ${p.codigo}<br>
<b>Producto:</b> ${p.producto}<br>
<b>Marca:</b> ${p.marca}<br>
<b>Stock actual:</b> ${p.stock}
`;

}

/* SUMAR STOCK */
async function sumarStock(){

let add = Number(document.getElementById("stockAdd").value);

if(!add){
mostrar("Ingresa cantidad");
return;
}

productos[productoIndex].stock =
Number(productos[productoIndex].stock || 0) + add;

await fetch("guardar.php",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(productos)
});

mostrar("✔ Stock actualizado");

document.getElementById("stockAdd").value = "";
}

/* MENSAJE */
function mostrar(msg){
document.getElementById("mensaje").innerText = msg;
setTimeout(()=>document.getElementById("mensaje").innerText="",2000);
}

</script>

</body>
</html>
